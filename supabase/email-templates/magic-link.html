<!DOCTYPE html>
<html lang="de">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="margin:0;padding:0;background-color:#F8FAFC;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F8FAFC;padding:40px 20px;">
    <tr><td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#fff;border-radius:12px;border:1px solid #E2E8F0;overflow:hidden;">
        <!-- Header -->
        <tr><td style="background-color:#046BD2;padding:24px;text-align:center;">
          <span style="color:#fff;font-size:20px;font-weight:700;">mein<span style="opacity:0.8">dein</span>unser</span>
        </td></tr>
        <!-- Content -->
        <tr><td style="padding:32px 24px;">
          <h1 style="margin:0 0 16px;font-size:22px;color:#1E293B;">Dein Anmeldelink</h1>
          <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#64748B;">
            Klicke auf den Button, um dich bei meindeinunser.com anzumelden.
          </p>
          <table width="100%" cellpadding="0" cellspacing="0">
            <tr><td align="center">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;background-color:#046BD2;color:#fff;font-size:15px;font-weight:600;text-decoration:none;padding:12px 32px;border-radius:8px;">
                Jetzt anmelden
              </a>
            </td></tr>
          </table>
          <p style="margin:24px 0 0;font-size:13px;line-height:1.5;color:#94A3B8;">
            Dieser Link ist 24 Stunden gültig. Falls du keinen Anmeldelink angefordert hast, kannst du diese E-Mail ignorieren.
          </p>
        </td></tr>
        <!-- Footer -->
        <tr><td style="padding:16px 24px;border-top:1px solid #E2E8F0;text-align:center;">
          <p style="margin:0;font-size:12px;color:#94A3B8;">meindeinunser.com — Nachbarn verbinden in Mainz</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
